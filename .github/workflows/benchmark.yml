name: benchmark
on:
  schedule:
    # Sunday 17:00 UTC.
    - cron: "0 17 * * 0"
  # To run the workflow from the Actions tab.
  workflow_dispatch:
jobs:
  build:
    name: Evaluate benchmarks and upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Guix
        uses: PromyLOPh/guix-install-action@v1
        with:
          pullAfterInstall: false
      - name: Authorise substitutes
        # Binary substitutes for Guix Science packages for
        # x86_64-linux are available from
        # https://guix.bordeaux.inria.fr.  Authorise them.
        run: |
          sudo /var/guix/profiles/per-user/root/current-guix/bin/guix archive --authorize <<EOF
          (public-key
           (ecc
            (curve Ed25519)
            (q #89FBA276A976A8DE2A69774771A92C8C879E0F24614AAAAE23119608707B3F06#)))
          EOF
      - name: Evaluate benchmarks
        # Downloading the "guix" channel from Codeberg (or Savannah)
        # can fail due to network issues.
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i to download Guix channel from default URL"
            guix time-machine -C channels.scm -- describe -f channels |
              tee ${{ runner.temp }}/channels.scm.lock
            if [ -s ${{ runner.temp }}/channels.scm.lock ]; then
              break
            fi
            echo "Attempt $i to download Guix channel from Savannah"
            guix time-machine -C channels.scm \
              --url=https://git.savannah.gnu.org/git/guix.git \
              -- describe -f channels | tee ${{ runner.temp }}/channels.scm.lock
            if [ -s ${{ runner.temp }}/channels.scm.lock ]; then
              break
            fi
          done
          out=$(guix time-machine -C ${{ runner.temp }}/channels.scm.lock \
            -- build \
            --substitute-urls="https://bordeaux.guix.gnu.org https://ci.guix.gnu.org https://guix.bordeaux.inria.fr" \
            -f benchmark/guix.scm)
          mkdir site
          cp -rL $out/. site
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/
  deploy:
    # XXX: This job requires the workflow to be ran from the default
    # branch (master).
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy pages
        id: deployment
        uses: actions/deploy-pages@v5
